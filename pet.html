<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGril Pet</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        body {
            user-select: none;
            -webkit-user-select: none;
        }

        #pet-shell {
            position: relative;
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #pet-shell:active {
            cursor: grabbing;
        }

        #canvas-container {
            position: absolute;
            inset: 0;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        #pet-tip {
            position: absolute;
            left: 50%;
            bottom: 16px;
            transform: translateX(-50%);
            padding: 6px 12px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.84);
            color: #346f93;
            font-size: 12px;
            line-height: 1.4;
            backdrop-filter: blur(10px);
            white-space: nowrap;
            pointer-events: none;
        }

        .pet-hidden-ui {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            left: -9999px;
            top: -9999px;
        }
    </style>
</head>
<body>
    <div id="pet-shell">
        <div id="canvas-container"></div>
        <div id="pet-tip">左键聊天，右键更多，拖动可摆放位置</div>

        <div class="pet-hidden-ui" aria-hidden="true">
            <div id="message-list"></div>
            <textarea id="message-input"></textarea>
            <button id="send-btn" type="button">发送</button>
        </div>
    </div>

    <script type="module" src="./src/pet-app.js"></script>
</body>
</html>
