appId: com.aigril.desktop
productName: AIGril
artifactName: ${productName}-${version}-${arch}.${ext}
directories:
  output: release
files:
  - dist/**/*
  - electron/**/*
  - package.json
extraMetadata:
  main: electron/main.cjs
asar: true
asarUnpack:
  - electron/**/*.py
npmRebuild: false
win:
  executableName: AIGril
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  artifactName: ${productName}-Setup-${version}-win-${arch}.${ext}
portable:
  artifactName: ${productName}-Portable-${version}-win-${arch}.${ext}
mac:
  category: public.app-category.utilities
  darkModeSupport: true
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
linux:
  category: Utility
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64
