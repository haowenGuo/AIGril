name: Build Desktop Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or update, for example v1.0.3"
        required: true
        default: "v1.0.3"
      publish_to_release:
        description: "Upload generated assets to GitHub Release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            build_script: pnpm desktop:package:win
            artifact_name: desktop-windows-x64
            artifact_paths: |
              release/*.exe
              release/*.blockmap
          - name: Linux x64
            os: ubuntu-latest
            build_script: pnpm desktop:package:linux
            artifact_name: desktop-linux-x64
            artifact_paths: |
              release/*.AppImage
              release/*.deb
              release/*.tar.gz
          - name: macOS Intel
            os: macos-13
            build_script: pnpm desktop:package:mac:x64
            artifact_name: desktop-macos-x64
            artifact_paths: |
              release/*.dmg
              release/*.zip
          - name: macOS Apple Silicon
            os: macos-14
            build_script: pnpm desktop:package:mac:arm64
            artifact_name: desktop-macos-arm64
            artifact_paths: |
              release/*.dmg
              release/*.zip

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libopenjp2-tools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop packages
        run: ${{ matrix.build_script }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

      - name: Resolve release tag
        id: release_tag
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure GitHub Release exists
        if: steps.release_tag.outputs.tag != '' && (github.event_name == 'push' || inputs.publish_to_release)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if ! gh release view "${{ steps.release_tag.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "${{ steps.release_tag.outputs.tag }}" \
              --repo "${{ github.repository }}" \
              --title "AIGril ${{ steps.release_tag.outputs.tag }}" \
              --notes "Automated multi-platform desktop package release."
          fi

      - name: Upload assets to GitHub Release
        if: steps.release_tag.outputs.tag != '' && (github.event_name == 'push' || inputs.publish_to_release)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          shopt -s nullglob
          files=(release/*)
          matched=0
          for file in "${files[@]}"; do
            case "$file" in
              *.exe|*.blockmap|*.dmg|*.zip|*.AppImage|*.deb|*.tar.gz)
                echo "Uploading $file"
                gh release upload "${{ steps.release_tag.outputs.tag }}" "$file" --repo "${{ github.repository }}" --clobber
                matched=1
                ;;
            esac
          done

          if [[ "$matched" -ne 1 ]]; then
            echo "No release assets matched in ./release"
            exit 1
          fi
